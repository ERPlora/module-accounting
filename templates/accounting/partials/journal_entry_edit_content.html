{% load djicons i18n %}
<div data-back-url="{% url 'accounting:dashboard' %}" hidden></div>

<div class="p-4">
    <!-- Header -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-2xl font-bold">{% trans "Edit Journalentry" %}</h1>
        <div class="flex gap-2">
            <a class="btn btn-ghost btn-sm"
               hx-get="{% url 'accounting:dashboard' %}"
               hx-target="#main-content-area"
               hx-push-url="true">
                {% trans "Cancel" %}
            </a>
            <button type="submit" form="edit-journal_entry-form" class="btn btn-sm color-primary">
                {% icon "checkmark-outline" %}
                {% trans "Save" %}
            </button>
        </div>
    </div>

        {% if error %}
        <div class="callout callout-error">
            <div class="callout-content"><span class="callout-text">{{ error }}</span></div>
        </div>
        {% endif %}
    <!-- Form -->
    <form id="edit-journal_entry-form"
          hx-post="{% url 'accounting:journal_entry_edit' obj.id %}" class="max-w-2xl">
        {% csrf_token %}
        <div class="card mb-4">
            <div class="card-body flex flex-col gap-4">
                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Entry Number" %}</label>
                <input type="text" name="entry_number" class="input input-sm w-full" value="{{ obj.entry_number }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Date" %}</label>
                <input type="date" name="date" class="input input-sm w-full" value="{{ obj.date }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Description" %}</label>
                <textarea name="description" class="textarea textarea-sm w-full" rows="3">{{ obj.description }}</textarea>
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Status" %}</label>
                <input type="text" name="status" class="input input-sm w-full" value="{{ obj.status }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Total Debit" %}</label>
                <input type="number" name="total_debit" class="input input-sm w-full" step="0.01" value="{{ obj.total_debit }}">
                </div>

                <div>
                <label class="text-sm font-medium mb-1 block">{% trans "Total Credit" %}</label>
                <input type="number" name="total_credit" class="input input-sm w-full" step="0.01" value="{{ obj.total_credit }}">
                </div>
            </div>
        </div>
    </form>
</div>
